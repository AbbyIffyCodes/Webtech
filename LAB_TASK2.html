<!DOCTYPE html>
<head>
	<title>
		Registration
	</title>
</head>
<body>
	<table><tr>
		
		<h1>Registration</h1>

		<td>
	<fieldset>
    <legend> General Information </legend>
    <label>First Name     :<input type ="text"></label><br>

    <br>
    <label>Last Name      :<input type ="text"></label><br>

    <br>
    <label>Gender         :</label>
    <input type ="radio" name="male" id="male" value="male">
			       <label for="male">Male</label>
			       <input type ="radio" name="female" id="female" value="female">
			       <label for="female">Female</label>
    <br><br>
    <label>Father's Name  :<input type ="text"></label> <input type="file"><br>
    <br>
    <label>Mother's Name  :<input type ="text"></label><br>
    <br>
    <label>Blood Group    :</label>
    <select name = BG+->
    	                <option>A+</option>
						<option>B+</option>
						<option>O+</option>
						<option>AB+</option>
						<option>A-</option>
						<option>O-</option>
						<option>AB-</option>
					</select>
    <br><br>
    <label>Religion       :Islam</label>
    <select name = Religion>
    	                <option>Islam</option>
						<option>Hinduism</option>
						<option>Christian</option>
						<option>Buddhism</option>
						
					</select>
    <br><br>
    </fieldset>
        </td>

        <td>
	<fieldset>
    <legend> Contact Information </legend>
    <label>Email    :<input type ="text"></label><br>

    <br>
    <label>Phone/Mobile      :<input type ="text"></label><br>

    <br>
    <label>Website      :<input type ="text"></label><br>

    <br>
    <label>Address         :</label> <fieldset><legend>Present Address</legend>
    	<select name = Country>
    	                <option>Bangladesh</option>
						<option>India</option>
						<option>Pakistan</option>
						<option>Argentina</option>
						<option>France</option>
						<option>Germany</option>
						<option>Brazil</option>
					</select>
					<select name = City>
    	                <option>Dhaka</option>
						<option>Delhi</option>
						<option>Karachi</option>
						<option>XYZ</option>
						<option>Paris</option>
						<option>EFG</option>
						<option>ABC</option>
					</select>
					<br>

					<textarea id="address" name="address" rows="4" cols="50" placeholder="Road/Street/City"   /></textarea>
					<input type="text" placeholder="Post Code"><br><br>


    </fieldset>
    
    </fieldset>
        </td>
    <td>
	<fieldset>
    <legend> Account Information </legend>
    <label>User Name     :<input type ="text"></label><br>

    <br>
    <label>Password     :<input type ="Password"></label><br>

    <br>

    <label>Confirm Password     :<input type ="Password"></label><br>

    <br>
    
    </fieldset>
    <br>
    <button>Register</button>
        </td>

        



	</tr></table>

</body>
